<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets.mind; maxTrack: 2;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <a-asset-item id="teddyModel" src="teddy.glb"></a-asset-item>
        <a-video id="myVideo" src="timer.mp4" autoplay loop="true" muted playsinline webkit-playsinline></a-video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model id="teddy" look-at="[camera]" rotation="0 0 0" position="0 0 0.1" scale="0.9 0.9 0.9" src="#teddyModel"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-video rotation="0 0 0" position="0 0 0.1" scale="0.9 0.9 0.9" width="1" height="0.5625" src="#myVideo"></a-video>
      </a-entity>
    </a-scene>
  </body>
</html>
